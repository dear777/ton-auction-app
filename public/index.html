<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Auction Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #fff; --red: #ff4d4d; --gray: #888; --owner-bg: #1a3a3a; --user-bg: #25282e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .header { background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index:100; padding: 12px 15px; }
        .filter-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        select { background: #25282e; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; font-size: 0.85rem; }

        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; pointer-events: none; }
        
        .q-item-user { background: var(--user-bg); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #555; font-size: 0.85rem; }
        .q-item-owner { background: var(--owner-bg); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #00ff88; font-size: 0.85rem; }
        .role-tag { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 2px; }

        #detail-screen, #create-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 16px; font-weight: bold; position: fixed; bottom: 20px; left: 15px; z-index: 10; cursor: pointer; }
        input, textarea { width: 100%; background: #25282e; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin: 8px 0; box-sizing: border-box; }
        .disclaimer-box { background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; padding: 10px; border-radius: 10px; color: #ffc107; font-size: 0.75rem; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:bold; color:var(--accent);">MARKETPLACE</div>
            <div id="ton-connect"></div>
        </div>
        <div class="filter-controls">
            <select id="main-cat-filter" onchange="runFilters()">
                <option value="Все">Все категории</option>
                <option value="Антиквариат">🏺 Антиквариат</option>
                <option value="Монеты">🪙 Монеты</option>
                <option value="Электроника">📱 Электроника</option>
                <option value="Разное">📦 Разное</option>
            </select>
            <select id="main-cur-filter" onchange="runFilters()">
                <option value="Все">Все валюты</option>
                <option value="TON">TON</option>
                <option value="USD">USD</option>
            </select>
        </div>
    </div>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:var(--gray); background:none; border:none; padding:10px 0;">← Назад</button>
        <div class="disclaimer-box">⚠️ Ответственность за сохранность товара до передачи лежит полностью на продавце.</div>
        <div id="detail-content"></div>
        <div id="detail-timer" style="color:var(--red); font-weight:bold; margin:10px 0; font-size:1.2rem; text-align:center;"></div>
        
        <div style="background: #25282e; padding: 15px; border-radius: 12px; border: 1px solid #444;">
            <div id="highest-bidder" style="font-family:monospace; color:#00ff88; margin-bottom:10px; font-size:0.8rem;">--</div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="custom-bid-input" style="margin:0; flex:1;">
                <div id="currency-label" style="font-weight:bold;">TON</div>
            </div>
            <button class="btn-main" style="position:static; width:100%; margin-top:10px;" onclick="makeCustomBid()">Сделать ставку</button>
        </div>

        <div style="margin-top:25px; border-top:1px solid #333; padding-top:20px;">
            <h3>💬 Обсуждение</h3>
            <div id="questions-list"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="q-input" placeholder="Написать сообщение..."><button onclick="sendQuestion()" style="background:var(--accent); border:none; color:white; border-radius:10px; padding:0 20px;">Отправить</button>
            </div>
        </div>
    </div>

    <div id="create-screen">
        <h2>🆕 Выставить лот</h2>
        <input type="text" id="title" placeholder="Название">
        <textarea id="desc" placeholder="Описание" rows="3"></textarea>
        <select id="create-category">
            <option value="Антиквариат">🏺 Антиквариат</option>
            <option value="Монеты">🪙 Монеты</option>
            <option value="Электроника">📱 Электроника</option>
            <option value="Разное">📦 Разное</option>
        </select>
        <select id="create-condition">
            <option value="Новое">💎 Новое</option>
            <option value="Б/У">👍 Б/У</option>
        </select>
        <button onclick="openUpload()" style="background:#444; color:#fff; border:none; padding:15px; width:100%; border-radius:12px; margin:10px 0;">📸 Загрузить фото</button>
        <input type="number" id="create-price" placeholder="Цена">
        <select id="create-currency"><option value="TON">TON</option><option value="USD">USD</option></select>
        <button class="btn-main" onclick="saveProduct()" style="position:static; width:100%;">Опубликовать</button>
    </div>

    <button class="btn-main" onclick="openCreate()">+ Выставить товар</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        let allLots = []; let currentP = null; let uploadedUrl = "";

        function openUpload() {
            cloudinary.openUploadWidget({ cloudName: 'dptgowe5b', uploadPreset: 'tonpreset', sources: ['local', 'camera'], multiple: false }, (err, res) => {
                if (!err && res.event === "success") { uploadedUrl = res.info.secure_url; }
            });
        }

        async function fetchLots() {
            const res = await fetch('/api/products'); allLots = await res.json();
            runFilters(); startTimers();
        }

        function runFilters() {
            const cat = document.getElementById('main-cat-filter').value;
            const cur = document.getElementById('main-cur-filter').value;
            const filtered = allLots.filter(p => (cat === 'Все' || p.category === cat) && (cur === 'Все' || p.currency === cur));
            document.getElementById('lots-list').innerHTML = filtered.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl || ''}" class="media-sq">
                    <div class="card-info">
                        <div style="font-weight:bold; font-size:0.85rem;">${p.title}</div>
                        <div style="color:var(--accent); font-weight:bold;">${p.currentBid} ${p.currency}</div>
                        <div class="timer-active" data-endtime="${p.endTime}" style="color:var(--red); font-size:0.7rem;">--:--:--</div>
                    </div>
                </div>`).join('');
        }

        async function openDetails(id) {
            currentP = allLots.find(x => x._id === id);
            const myWallet = tonConnectUI.wallet?.account.address;
            
            document.getElementById('detail-content').innerHTML = `
                <img src="${currentP.mediaUrl}" style="width:100%; border-radius:15px;">
                <h2>${currentP.title} (${currentP.condition})</h2>
                <p style="color:var(--gray);">${currentP.description}</p>
                <div style="font-size:1.6rem; font-weight:bold; color:var(--accent); text-align:center;">${currentP.currentBid} ${currentP.currency}</div>
            `;
            
            document.getElementById('highest-bidder').innerText = "Лидер: " + (currentP.highestBidder === "Ставок нет" ? "нет" : currentP.highestBidder.slice(0,14) + "...");
            document.getElementById('currency-label').innerText = currentP.currency;
            document.getElementById('custom-bid-input').value = currentP.currentBid + 1;
            
            renderForum(myWallet);
            document.getElementById('detail-screen').style.display = 'block';
        }

        function renderForum(myWallet) {
            document.getElementById('questions-list').innerHTML = currentP.questions.map(q => {
                const isSeller = q.userWallet.toLowerCase() === currentP.ownerWallet.toLowerCase();
                return `<div class="${isSeller ? 'q-item-owner' : 'q-item-user'}"><span class="role-tag">${isSeller ? 'Продавец' : 'Покупатель'}</span>${q.text}</div>`;
            }).join('');
        }

        async function sendQuestion() {
            const input = document.getElementById('q-input');
            const text = input.value.trim();
            if(!text || !tonConnectUI.wallet) return alert("Нужен текст и кошелек!");

            await fetch(`/api/products/${currentP._id}/question`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address, text: text }) 
            });
            input.value = "";
            const productsRes = await fetch('/api/products');
            allLots = await productsRes.json();
            currentP = allLots.find(x => x._id === currentP._id);
            renderForum(tonConnectUI.wallet.account.address);
        }

        async function makeCustomBid() {
            if (!tonConnectUI.wallet) return alert("Привяжите кошелек!");
            const amount = Number(document.getElementById('custom-bid-input').value);
            const res = await fetch('/api/bid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ productId: currentP._id, wallet: tonConnectUI.wallet.account.address, amount }) });
            if (res.ok) { await fetchLots(); openDetails(currentP._id); }
        }

        function startTimers() {
            setInterval(() => {
                const now = new Date().getTime();
                document.querySelectorAll('.timer-active').forEach(el => {
                    const diff = new Date(el.dataset.endtime) - now;
                    el.innerText = diff > 0 ? new Date(diff).toISOString().substr(11, 8) : "ЗАВЕРШЕНО";
                });
                if (currentP) {
                    const diff = new Date(currentP.endTime) - now;
                    document.getElementById('detail-timer').innerText = diff > 0 ? "⏳ " + new Date(diff).toISOString().substr(11, 8) : "ЗАВЕРШЕНО";
                }
            }, 1000);
        }

        async function saveProduct() {
            if(!uploadedUrl) return alert("Загрузите фото!");
            const data = { title: document.getElementById('title').value, description: document.getElementById('desc').value, mediaUrl: uploadedUrl, category: document.getElementById('create-category').value, condition: document.getElementById('create-condition').value, startPrice: document.getElementById('create-price').value, currency: document.getElementById('create-currency').value, ownerWallet: tonConnectUI.wallet.account.address };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; currentP = null; }
        function openCreate() { document.getElementById('create-screen').style.display = 'block'; }
        fetchLots();
    </script>
</body>
</html>
