<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        [dir="rtl"] { text-align: right; }
        
        .header { background: var(--card); border-bottom: 1px solid #333; padding: 12px; position: sticky; top:0; z-index:100; }
        .lang-switch { display: flex; gap: 5px; margin-bottom: 10px; }
        .lang-btn { background: #1f2229; color: #fff; border: 1px solid #333; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); }

        #reg-screen, #karma-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .karma-text { font-size: 0.8rem; line-height: 1.5; color: #ccc; background: #16181c; padding: 15px; border-radius: 12px; border: 1px solid #333; margin: 15px 0; max-height: 300px; overflow-y: auto; }
        
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #2d2f36; }
        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 18px; font-weight: 900; position: fixed; bottom: 20px; left: 15px; z-index: 10; cursor: pointer; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
        
        #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; padding: 20px; overflow-y: auto; box-sizing: border-box; }
    </style>
</head>
<body id="main-body">

    <div id="reg-screen">
        <h2 id="reg-title">Регистрация</h2>
        <p id="reg-desc" style="font-size:0.85rem; color:var(--gray);"></p>
        <input type="text" id="reg-tg-id" placeholder="Telegram User ID (Цифры)">
        <input type="text" id="reg-tg-nick" placeholder="@username">
        <div style="background:#16181c; padding:15px; border-radius:12px; margin:15px 0;">
            <b id="sub-title">Подписка 5$</b>
            <p id="sub-desc" style="font-size:0.75rem; color:var(--gray); margin-top:5px;"></p>
            <button id="pay-btn" style="width:100%; background:var(--gold); border:none; padding:10px; border-radius:8px; font-weight:bold;">Оплатить членский взнос</button>
        </div>
        <button class="btn-main" style="position:static; width:100%;" onclick="submitReg()">Продолжить</button>
    </div>

    <div id="karma-screen">
        <h2 id="karma-title">Система Кармы</h2>
        <div class="karma-text" id="karma-legal"></div>
        <label style="display:flex; align-items:center; gap:10px; font-size:0.8rem;">
            <input type="checkbox" id="karma-check" style="width:20px; margin:0;">
            <span id="karma-agree"></span>
        </label>
        <button class="btn-main" style="position:static; width:100%; margin-top:20px;" onclick="acceptKarma()">Подтвердить</button>
    </div>

    <div class="header">
        <div class="lang-switch">
            <div class="lang-btn" onclick="setLang('ru')">RU</div>
            <div class="lang-btn" onclick="setLang('en')">EN</div>
            <div class="lang-btn" onclick="setLang('he')">HE</div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:900; color:var(--gold);">GOLD AUCTION</div>
            <div id="ton-connect"></div>
        </div>
    </div>

    <div id="lots-list"></div>
    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:var(--gray); background:none; border:none; padding:15px 0;">← BACK</button>
        <div id="detail-content"></div>
    </div>

    <button class="btn-main" onclick="openCreate()">+ SELL ITEM</button>

    <script>
        const i18n = {
            ru: {
                regTitle: "Регистрация профиля",
                regDesc: "Ваш Telegram ID будет передан контрагенту только после завершения торгов для связи.",
                subTitle: "Членский взнос (5$ / мес)",
                subDesc: "Данный взнос помогает проекту развиваться, отсекает мошенников и ботов, подтверждая серьезность ваших намерений.",
                karmaTitle: "Юридический регламент 'Карма'",
                karmaLegal: "Настоящим Пользователь подтверждает, что любая форма девиантного поведения, включая, но не ограничиваясь: отказ от выкупа лота, предоставление фальсифицированных данных о состоянии товара или попытки обхода системы платежей, влечет за собой безусловную деградацию кредитного рейтинга (Кармы). Администрация оставляет за собой право на перманентную блокировку доступа при достижении критического порога рейтинга без возврата членских взносов.",
                karmaAgree: "Я подтверждаю ознакомление с регламентом и принимаю условия.",
                payBtn: "Оплатить взнос 5$"
            },
            en: {
                regTitle: "Profile Registration",
                regDesc: "Your Telegram ID will be shared with the counterparty only after the auction ends for communication.",
                subTitle: "Membership Fee ($5 / month)",
                subDesc: "This fee helps the project grow, filters out scammers and bots, and proves the seriousness of your intentions.",
                karmaTitle: "Legal Regulation 'Karma'",
                karmaLegal: "The User hereby acknowledges that any form of deviant behavior, including but not limited to: refusal to purchase a won lot, providing falsified data regarding item condition, or attempting to bypass the payment system, results in unconditional degradation of the credit rating (Karma). The Administration reserves the right to permanently block access upon reaching a critical rating threshold without refund of membership fees.",
                karmaAgree: "I acknowledge and accept these terms and conditions.",
                payBtn: "Pay $5 Fee"
            },
            he: {
                regTitle: "רישום פרופיל",
                regDesc: "מזהה הטלגרם שלך יועבר לצד השני רק לאחר סיום המכירה לצורך התקשרות.",
                subTitle: "דמי חבר (5$ לחודש)",
                subDesc: "תשלום זה מסייע לפרויקט לצמוח, מסנן רמאים ובוטים, ומעיד על רצינות כוונותיך.",
                karmaTitle: "תקנון משפטי 'קארמה'",
                karmaLegal: "המשתמש מאשר בזאת כי כל צורה של התנהגות חריגה, לרבות אך לא רק: סירוב לרכישת פריט שזכה, מסירת נתונים כוזבים לגבי מצב הפריט או ניסיון לעקוף את מערכת התשלומים, תגרור פגיעה בלתי מותנית בדירוג האשראי (קארמה). ההנהלה שומרת לעצמה את הזכות לחסימה לצמיתות עם הגעה לסף דירוג קריטי ללא החזר דמי חבר.",
                karmaAgree: "אני מאשר שקראתי ומקבל את התנאים.",
                payBtn: "שלם דמי חבר $5"
            }
        };

        let currentLang = 'ru';
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect' });
        
        function setLang(l) {
            currentLang = l;
            document.getElementById('main-body').dir = (l === 'he') ? 'rtl' : 'ltr';
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('reg-title').innerText = t.regTitle;
            document.getElementById('reg-desc').innerText = t.regDesc;
            document.getElementById('sub-title').innerText = t.subTitle;
            document.getElementById('sub-desc').innerText = t.subDesc;
            document.getElementById('pay-btn').innerText = t.payBtn;
            document.getElementById('karma-title').innerText = t.karmaTitle;
            document.getElementById('karma-legal').innerText = t.karmaLegal;
            document.getElementById('karma-agree').innerText = t.karmaAgree;
        }

        async function checkUser() {
            if (!tonConnectUI.wallet) return;
            const res = await fetch(`/api/user/${tonConnectUI.wallet.account.address}`);
            const user = await res.json();
            if (!user || !user.tgId) document.getElementById('reg-screen').style.display = 'block';
            else if (!user.agreedToTerms) document.getElementById('karma-screen').style.display = 'block';
        }

        async function submitReg() {
            const data = { wallet: tonConnectUI.wallet.account.address, tgId: document.getElementById('reg-tg-id').value, tgNick: document.getElementById('reg-tg-nick').value, lang: currentLang };
            await fetch('/api/user/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById('reg-screen').style.display = 'none';
            checkUser();
        }

        async function acceptKarma() {
            if (!document.getElementById('karma-check').checked) return alert("Accept terms!");
            await fetch('/api/user/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address, agreedToTerms: true }) });
            document.getElementById('karma-screen').style.display = 'none';
        }

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl}" class="media-sq">
                    <div style="padding:10px;">
                        <b>${p.title}</b><br>
                        <span style="color:var(--gold);">${p.currentBid} ${p.currency}</span>
                    </div>
                </div>`).join('');
        }

        function openDetails(id) { document.getElementById('detail-screen').style.display = 'block'; }
        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; }
        function openCreate() { if(!tonConnectUI.wallet) return; document.getElementById('create-screen').style.display = 'block'; }
        
        setLang('ru');
        setInterval(checkUser, 3000);
        fetchLots();
    </script>
</body>
</html>
