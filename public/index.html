<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; }
        [dir="rtl"] { text-align: right; }
        .header { background: var(--card); border-bottom: 1px solid #333; padding: 12px; position: sticky; top:0; z-index:100; }
        .lang-btn { background: #1f2229; color: white; border: 1px solid #333; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); }
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #2d2f36; }
        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 18px; font-weight: 900; position: fixed; bottom: 20px; left: 15px; z-index: 10; cursor: pointer; text-transform: uppercase; }
        #reg-screen, #karma-screen, #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        input, select { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body id="main-body">

    <div id="reg-screen">
        <h2 id="reg-title"></h2>
        <p id="reg-desc" style="font-size:0.85rem; color:var(--gray);"></p>
        <input type="text" id="reg-tg-id" placeholder="Telegram ID">
        <input type="text" id="reg-tg-nick" placeholder="@username">
        <div style="background:#16181c; padding:15px; border-radius:12px; margin:15px 0;">
            <b id="sub-title"></b>
            <p id="sub-desc" style="font-size:0.75rem; color:var(--gray); margin:5px 0;"></p>
            <button onclick="payMembership()" style="width:100%; background:var(--gold); border:none; padding:12px; border-radius:10px; font-weight:bold;">PAY 5 USDT</button>
        </div>
        <button class="btn-main" style="position:static; width:100%;" onclick="submitReg()">OK</button>
    </div>

    <div id="karma-screen">
        <h2 id="karma-title"></h2>
        <div id="karma-legal" style="font-size:0.8rem; background:#16181c; padding:15px; border-radius:12px; margin-bottom:15px;"></div>
        <label><input type="checkbox" id="karma-check"> <span id="karma-agree"></span></label>
        <button class="btn-main" style="position:static; width:100%; margin-top:20px;" onclick="acceptKarma()">ACCEPT</button>
    </div>

    <div class="header">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
            <button class="lang-btn" id="btn-he" onclick="setLang('he')">HE</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:900; color:var(--gold);">GOLD AUCTION</div>
            <div id="ton-connect"></div>
        </div>
    </div>

    <div id="lots-list"></div>
    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:var(--gray); background:none; border:none; padding:15px 0;">← BACK</button>
        <div id="detail-content"></div>
    </div>
    <button class="btn-main" onclick="openCreate()">+ SELL ITEM</button>

    <script>
        const i18n = {
            ru: { regTitle: "Регистрация", regDesc: "ID Телеграм нужен для связи.", subTitle: "Взнос 5 USDT", subDesc: "Членский взнос против ботов.", karmaTitle: "Правила Кармы", karmaLegal: "Вы соглашаетесь с правилами честной торговли.", karmaAgree: "Я согласен" },
            en: { regTitle: "Registration", regDesc: "Telegram ID for contact.", subTitle: "Fee 5 USDT", subDesc: "Membership fee against bots.", karmaTitle: "Karma Rules", karmaLegal: "You agree to fair trading rules.", karmaAgree: "I agree" },
            he: { regTitle: "הרשמה", regDesc: "מזהה טלגרם ליצירת קשר.", subTitle: "דמי חבר 5 USDT", subDesc: "התשלום מסנן בוטים.", karmaTitle: "חוקי קארמה", karmaLegal: "הנך מסכים לכללי הסחר ההוגן.", karmaAgree: "אני מסכים" }
        };

        let currentLang = 'ru';
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect' });

        function setLang(l) {
            currentLang = l;
            document.getElementById('main-body').dir = (l === 'he') ? 'rtl' : 'ltr';
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('reg-title').innerText = t.regTitle;
            document.getElementById('reg-desc').innerText = t.regDesc;
            document.getElementById('sub-title').innerText = t.subTitle;
            document.getElementById('sub-desc').innerText = t.subDesc;
            document.getElementById('karma-title').innerText = t.karmaTitle;
            document.getElementById('karma-legal').innerText = t.karmaLegal;
            document.getElementById('karma-agree').innerText = t.karmaAgree;
        }

        async function checkUser() {
            if (!tonConnectUI.wallet) return;
            const res = await fetch(`/api/user/${tonConnectUI.wallet.account.address}`);
            const user = await res.json();
            if (!user.tgId) document.getElementById('reg-screen').style.display = 'block';
            else if (user.isPaid && !user.agreedToTerms) document.getElementById('karma-screen').style.display = 'block';
        }

        async function payMembership() {
            const wallet = tonConnectUI.wallet.account.address;
            const comment = "PAY-" + wallet.slice(-6);
            const my = "UQDqKsn27Rq-w8NYpWE7gv-X2wWm2ntCFlvs6gboqDP8A0xu";
            const usdt = "EQCxE6mUtQWq7sznu_G9vhqS6S86shwyuS_T5qPOW_S2V8W1";
            window.location.href = `ton://transfer/${my}?amount=5000000&text=${comment}&jetton=${usdt}`;
        }

        async function submitReg() {
            const data = { wallet: tonConnectUI.wallet.account.address, tgId: document.getElementById('reg-tg-id').value, tgNick: document.getElementById('reg-tg-nick').value };
            await fetch('/api/user/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            checkUser();
        }

        async function acceptKarma() {
            if (!document.getElementById('karma-check').checked) return;
            await fetch('/api/user/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address, agreedToTerms: true }) });
            document.getElementById('karma-screen').style.display = 'none';
        }

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `<div class="lot-card">...</div>`).join('');
        }

        setLang('ru');
        setInterval(checkUser, 5000);
        fetchLots();
    </script>
</body>
</html>
