<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marketplace Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Сетка 2x2 */
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .media-sq { width: 100%; aspect-ratio: 1/1; background: #000; object-fit: cover; }
        
        /* Форум */
        .forum-msg { background: #25282e; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .msg-actions { font-size: 0.7rem; color: #888; cursor: pointer; display: flex; gap: 10px; margin-top: 5px; }

        #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 16px; font-weight: bold; position: fixed; bottom: 15px; left: 15px; }
        input, textarea { width: 100%; background: #25282e; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:#888; background:none; border:none; padding:10px 0;">← Назад</button>
        <div id="detail-content"></div>
        <div id="detail-timer" style="color:#ff4d4d; font-weight:bold; margin:10px 0;">--:--:--</div>
        
        <div class="forum-container">
            <h3>💬 Форум (Обсуждение)</h3>
            <div id="questions-list"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="q-input" placeholder="Написать на форум...">
                <button onclick="sendQuestion()" style="background:var(--accent); border:none; color:#fff; border-radius:10px; padding:0 15px;">Отправить</button>
            </div>
        </div>
    </div>

    <div id="create-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
        <h2>🆕 Выставить товар</h2>
        <input type="text" id="title" placeholder="Название лота">
        <textarea id="desc" placeholder="Описание, состояние, доставка"></textarea>
        
        <button onclick="openMediaSelector()" style="background:#444; color:#fff; border:none; padding:15px; width:100%; border-radius:12px; margin:10px 0;">
            📸 Добавить фото/видео с телефона
        </button>
        <div id="upload-info" style="font-size:0.8rem; color:var(--accent); text-align:center;">Файл не выбран</div>

        <input type="number" id="price" placeholder="Стартовая цена">
        <button class="btn-main" onclick="saveProduct()" style="position:static; width:100%; margin-top:20px;">Опубликовать навсегда</button>
        <button onclick="document.getElementById('create-screen').style.display='none'" style="background:none; border:none; color:#888; width:100%; margin-top:15px;">Отмена</button>
    </div>

    <div id="ton-connect" style="position:fixed; top:10px; right:10px; z-index:1000;"></div>
    <button class="btn-main" onclick="openCreate()">+ Добавить лот</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        let uploadedUrl = "";
        let currentP = null;

        // ВЫБОР МЕДИА С ТЕЛЕФОНА
        function openMediaSelector() {
            // Чтобы это работало, тебе нужно зарегистрироваться на cloudinary.com
            // и вписать свой "cloudName" и "uploadPreset" ниже.
            cloudinary.openUploadWidget({
                cloudName: 'twstton', 
                uploadPreset: 'tonpreset', 
                sources: ['local', 'camera'],
                multiple: false
            }, (error, result) => {
                if (!error && result.event === "success") {
                    uploadedUrl = result.info.secure_url;
                    document.getElementById('upload-info').innerText = "✅ Медиа загружено успешно!";
                }
            });
        }

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl || 'https://via.placeholder.com/200'}" class="media-sq">
                    <div style="padding:10px;">
                        <div style="font-weight:bold; font-size:0.9rem; margin-bottom:5px;">${p.title}</div>
                        <div style="color:var(--accent); font-weight:bold;">${p.currentBid} TON</div>
                    </div>
                </div>
            `).join('');
        }

        async function openDetails(id) {
            const res = await fetch('/api/products');
            const data = await res.json();
            currentP = data.find(x => x._id === id);
            
            const wallet = tonConnectUI.wallet?.account.address;

            document.getElementById('detail-content').innerHTML = `
                <img src="${currentP.mediaUrl}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <h1 style="margin:0;">${currentP.title}</h1>
                <p style="color:#aaa;">${currentP.description}</p>
                <div style="background:#25282e; padding:15px; border-radius:12px;">
                    <div>Цена: <strong>${currentP.currentBid} TON</strong></div>
                </div>
            `;
            
            renderForum(wallet);
            document.getElementById('detail-screen').style.display = 'block';
            startDetailTimer();
        }

        function renderForum(myWallet) {
            document.getElementById('questions-list').innerHTML = currentP.questions.map(q => `
                <div class="forum-msg">
                    <div style="font-size:0.7rem; color:#888;">Кошелек: ${q.userWallet.slice(0,6)}...</div>
                    <div id="text-${q._id}">${q.text}</div>
                    ${q.userWallet === myWallet ? `
                        <div class="msg-actions">
                            <span onclick="editMsg('${q._id}')">изменить</span>
                            <span onclick="deleteMsg('${q._id}')" style="color:#ff4d4d">удалить</span>
                        </div>
                    ` : ''}
                    ${q.answer ? `<div style="margin-top:5px; color:#00ff88;">💬 Ответ: ${q.answer}</div>` : ''}
                </div>
            `).join('');
        }

        function startDetailTimer() {
            const timer = document.getElementById('detail-timer');
            const interval = setInterval(() => {
                const diff = new Date(currentP.endTime) - new Date();
                if (diff <= 0 || !currentP) { timer.innerText = "ЗАВЕРШЕНО"; clearInterval(interval); return; }
                timer.innerText = "До конца: " + new Date(diff).toISOString().substr(11, 8);
            }, 1000);
        }

        async function saveProduct() {
            if (!uploadedUrl) return alert("Пожалуйста, загрузите фото или видео!");
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                mediaUrl: uploadedUrl,
                startPrice: document.getElementById('price').value,
                currency: "TON",
                ownerWallet: tonConnectUI.wallet.account.address
            };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        function openCreate() { if(!tonConnectUI.wallet) return alert("Привяжите кошелек!"); document.getElementById('create-screen').style.display = 'block'; }
        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; currentP = null; }

        fetchLots();
    </script>
</body>
</html>
