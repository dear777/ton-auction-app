<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Auction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #bid-value { font-size: 2em; color: #0088cc; font-weight: bold; }
        #timer { font-size: 1.2em; color: #e74c3c; margin: 15px 0; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1em; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Аукцион Лот #1</h1>
        <div id="timer">Загрузка таймера...</div>
        <p>Текущая ставка:</p>
        <div id="bid-value">-- TON</div>
        <p>Лидер: <span id="bidder">--</span></p>
        <button id="bid-btn" onclick="placeBid()">Сделать ставку (+1 TON)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentBid = 0;
        let auctionEndTime = null;

        async function loadData() {
            const res = await fetch('/api/auction');
            const data = await res.json();
            currentBid = data.currentBid;
            auctionEndTime = new Date(data.endTime);
            document.getElementById('bid-value').innerText = currentBid + ' TON';
            document.getElementById('bidder').innerText = data.highestBidder;
        }

        async function placeBid() {
            const nextBid = currentBid + 1;
            const res = await fetch('/api/bid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe.user?.first_name || "Аноним", amount: nextBid })
            });
            if (res.ok) loadData();
        }

        setInterval(() => {
            if (!auctionEndTime) return;
            const now = new Date();
            const diff = auctionEndTime - now;
            const btn = document.getElementById('bid-btn');

            if (diff <= 0) {
                document.getElementById('timer').innerText = "🔴 ТОРГИ ОКОНЧЕНЫ";
                btn.disabled = true;
                return;
            }

            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `⏳ До конца: ${hours}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);

        loadData();
        tg.expand();
    </script>
</body>
</html>
