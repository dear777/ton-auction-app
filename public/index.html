<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .screen { display: none; padding: 20px; box-sizing: border-box; }
        .active-screen { display: block; }
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        input, select, textarea { width: 100%; background: #1f2229; border: 1px solid #333; padding: 12px; color: white; border-radius: 10px; margin: 5px 0; box-sizing: border-box; }
        .q-box { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; border-left: 3px solid var(--gold); }
        .seller-label { color: var(--gold); font-weight: bold; font-size: 0.7rem; }
        .buyer-label { color: var(--gray); font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="screen-create" class="screen">
        <h2>List Item</h2>
        <input type="text" id="c-title" placeholder="Title">
        <textarea id="c-desc" placeholder="Description"></textarea>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="c-cat"><option value="Coins">Coins</option><option value="Antiques">Antiques</option></select>
            <select id="c-curr">
                <option value="USDT">USDT</option>
                <option value="TON">TON</option>
                <option value="NOT">NOT</option>
                <option value="DOGS">DOGS</option>
            </select>
        </div>
        <input type="number" id="c-price" placeholder="Starting Price">
        <button class="btn-main" onclick="saveProduct()">PUBLISH</button>
    </div>

    <div id="screen-detail" class="screen">
        <button onclick="showScreen('home')">← BACK</button>
        <div id="detail-content"></div>
        
        <div id="qa-section" style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <h3>Discussion</h3>
            <div id="questions-list"></div>
            <input type="text" id="q-input" placeholder="Ask a question...">
            <button onclick="sendQuestion()" style="background:#333; color:white; border:none; padding:8px; width:100%; border-radius:8px;">Send Message</button>
        </div>

        <div style="margin-top:20px; background:var(--card); padding:15px; border-radius:15px;">
            <div id="detail-timer" style="color:var(--red); text-align:center; margin-bottom:10px;"></div>
            <input type="number" id="bid-input" placeholder="Enter amount">
            <button class="btn-main" onclick="makeBid()">PLACE BID</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json' });
        let currentP = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screen-' + id).classList.add('active-screen');
        }

        function openDetails(id) {
            // Находим лот и отрисовываем диалоги
            currentP = allLots.find(x => x._id === id);
            renderQuestions();
            showScreen('detail');
        }

        function renderQuestions() {
            const list = document.getElementById('questions-list');
            list.innerHTML = currentP.questions.map(q => `
                <div class="q-box">
                    <span class="${q.isSeller ? 'seller-label' : 'buyer-label'}">
                        ${q.isSeller ? 'SELLER' : 'BUYER'}
                    </span>
                    <p style="margin:5px 0;">${q.text}</p>
                </div>
            `).join('');
        }

        async function sendQuestion() {
            const text = document.getElementById('q-input').value;
            const wallet = tonConnectUI.wallet.account.address;
            const isSeller = (wallet === currentP.ownerWallet);
            
            const res = await fetch(`/api/products/${currentP._id}/ask`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ wallet, text, isSeller })
            });
            currentP = await res.json();
            renderQuestions();
            document.getElementById('q-input').value = '';
        }

        async function saveProduct() {
            const data = {
                title: document.getElementById('c-title').value,
                currency: document.getElementById('c-curr').value,
                startPrice: document.getElementById('c-price').value,
                ownerWallet: tonConnectUI.wallet.account.address
                // ... остальные поля
            };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }
    </script>
</body>
</html>
