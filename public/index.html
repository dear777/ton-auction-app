<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Public Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #ffffff; --red: #ff4d4d; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        /* Карточка лота */
        .lot-card { background: var(--card); margin: 15px; border-radius: 18px; padding: 18px; border: 1px solid #2d3138; transition: transform 0.2s; }
        .lot-card:active { transform: scale(0.98); }
        .lot-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .lot-title { font-size: 1.1rem; font-weight: bold; margin: 0; flex: 1; }
        
        /* Информация о цене и времени */
        .lot-stats { display: flex; gap: 15px; margin-top: 10px; }
        .stat-box { flex: 1; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1rem; font-weight: 700; }
        .timer-active { color: var(--red); }

        /* Нижняя панель */
        .nav-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 20%); box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(0,136,204,0.3); cursor: pointer; }

        /* Окно создания */
        #create-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .form-title { font-size: 1.5rem; margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #25282e; border: 1px solid #3d424a; padding: 14px; color: white; border-radius: 12px; margin: 8px 0 15px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">TON AUCTION</div>
        <div id="ton-connect"></div>
    </div>

    <div id="lots-container">
        </div>

    <div id="create-modal">
        <div class="form-title">🚀 Создать свой лот</div>
        <label>Название товара</label>
        <input type="text" id="title" placeholder="Например: NFT Bored Ape">
        
        <label>Описание и условия</label>
        <textarea id="desc" rows="4" placeholder="Укажите состояние, способ доставки и нюансы..."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Старт цена</label>
                <input type="number" id="price" placeholder="1.0">
            </div>
            <div>
                <label>Валюта</label>
                <select id="currency">
                    <option value="TON">TON</option>
                    <option value="USD">USD ($)</option>
                    <option value="ILS">Шекель (₪)</option>
                    <option value="BTC">BTC</option>
                </select>
            </div>
        </div>

        <p style="font-size: 0.75rem; color: #666; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px;">
            🛡️ Выставляя товар, вы подтверждаете его наличие. Антиснайпер (10 мин) включен автоматически.
        </p>

        <button class="btn-add" onclick="saveProduct()">Опубликовать на витрине</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:20px;">Вернуться назад</button>
    </div>

    <div class="nav-bar">
        <button class="btn-add" onclick="openCreate()">+ Выставить свой товар</button>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function openCreate() {
            if (!tonConnectUI.wallet) {
                alert("Пожалуйста, подключите кошелек кнопкой вверху экрана! ↗️");
                return;
            }
            document.getElementById('create-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('create-modal').style.display = 'none'; }

        // Загрузка всех лотов
        async function fetchLots() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('lots-container');
            
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:100px 20px; color:#555;">Пока никто ничего не продает. Будь первым!</div>';
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="lot-card">
                    <div class="lot-header">
                        <h3 class="lot-title">${p.title}</h3>
                        <div style="font-size: 0.7rem; color: #555;">ID: ${p._id.slice(-4)}</div>
                    </div>
                    <div class="lot-stats">
                        <div class="stat-box">
                            <div class="stat-label">Текущая цена</div>
                            <div class="stat-value">${p.currentBid} ${p.currency}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">До конца</div>
                            <div class="stat-value timer-active" data-time="${p.endTime}">--:--:--</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Логика тикающих таймеров для каждого лота
        setInterval(() => {
            document.querySelectorAll('.timer-active').forEach(timer => {
                const end = new Date(timer.dataset.time);
                const diff = end - new Date();
                if (diff <= 0) {
                    timer.innerText = "ЗАВЕРШЕНО";
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timer.innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            });
        }, 1000);

        async function saveProduct() {
            const productData = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                startPrice: document.getElementById('price').value,
                currency: document.getElementById('currency').value,
                ownerWallet: tonConnectUI.wallet.account.address
            };

            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });

            if (response.ok) {
                closeModal();
                fetchLots();
            }
        }

        fetchLots();
    </script>
</body>
</html>
