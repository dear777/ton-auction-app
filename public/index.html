<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        [dir="rtl"] { text-align: right; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .tab-item { color: var(--gray); font-size: 0.7rem; text-align: center; cursor: pointer; opacity: 0.6; }
        .tab-item.active { color: var(--gold); opacity: 1; font-weight: bold; }
        
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 70px); background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-screen { display: block; }

        .header { background: var(--card); padding: 12px; border-bottom: 1px solid #333; position: sticky; top:0; z-index:100; }
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 16px; border: 1px solid #2d2f36; overflow: hidden; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body id="main-body">

    <div id="screen-home" class="screen active-screen">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-weight:900; color:var(--gold);">GOLD AUCTION</div>
                <div id="ton-connect"></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="setLang('ru')" style="background:none; border:none; color:white;">RU</button>
                <button onclick="setLang('en')" style="background:none; border:none; color:white;">EN</button>
                <button onclick="setLang('he')" style="background:none; border:none; color:white;">HE</button>
            </div>
        </div>
        <div id="lots-list"></div>
    </div>

    <div id="screen-create" class="screen">
        <h2 id="ui-sell-title">Выставить лот</h2>
        <input type="text" id="c-title" placeholder="Название">
        <textarea id="c-desc" placeholder="Описание" rows="3" style="width:100%; background:#1f2229; color:white; border-radius:12px; border:1px solid #333; padding:10px;"></textarea>
        <select id="c-cat"><option value="Антиквариат">🏺 Антиквариат</option></select>
        <button onclick="openUpload()" style="background:#444; color:#fff; border:none; padding:15px; width:100%; border-radius:12px;">📸 ФОТО</button>
        <input type="number" id="c-price" placeholder="Стартовая цена">
        <button class="btn-main" onclick="saveProduct()">ОПУБЛИКОВАТЬ (Комиссия 2%)</button>
    </div>

    <div id="screen-profile" class="screen">
        <h2 id="ui-profile-title">Мой профиль</h2>
        <div id="profile-info" style="background:var(--card); padding:20px; border-radius:15px;">
            <p id="ui-karma">Карма: 100</p>
            <p id="ui-paid">Статус: --</p>
        </div>
    </div>

    <div id="screen-detail" class="screen">
        <button onclick="showScreen('home')" style="color:var(--gray); background:none; border:none; padding:15px 0;">← НАЗАД</button>
        <div id="detail-content"></div>
        <div id="bid-box" style="margin-top:20px; background:var(--card); padding:15px; border-radius:15px;">
            <input type="number" id="bid-input" style="text-align:center;">
            <button class="btn-main" onclick="makeBid()">СДЕЛАТЬ СТАВКУ</button>
            <button class="btn-main" id="pay-winner-btn" style="display:none; background:#22c55e;" onclick="paySeller()">ОПЛАТИТЬ ЛОТ (98% + 2%)</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-home" onclick="showScreen('home')">🏺 ГЛАВНАЯ</div>
        <div class="tab-item" id="tab-create" onclick="showScreen('create')">➕ ПРОДАТЬ</div>
        <div class="tab-item" id="tab-profile" onclick="showScreen('profile')">👤 ПРОФИЛЬ</div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect' });
        let allLots = []; let currentP = null; let uploadedUrl = "";
        const MY_WALLET = "UQDqKsn27Rq-w8NYpWE7gv-X2wWm2ntCFlvs6gboqDP8A0xu";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active-screen');
            if(document.getElementById('tab-' + id)) document.getElementById('tab-' + id).classList.add('active');
        }

        async function paySeller() {
            const amount = currentP.currentBid * 1000000; // USDT 6 знаков
            const fee = amount * 0.02;
            const sellerAmount = amount * 0.98;
            
            // Формируем мульти-транзакцию: 98% продавцу и 2% тебе
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [
                    { address: currentP.ownerWallet, amount: sellerAmount.toString() },
                    { address: MY_WALLET, amount: fee.toString() }
                ]
            };
            await tonConnectUI.sendTransaction(transaction);
        }

        async function fetchLots() {
            const res = await fetch('/api/products'); allLots = await res.json();
            document.getElementById('lots-list').innerHTML = allLots.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl}" class="media-sq" style="width:100%">
                    <div style="padding:10px;"><b>${p.title}</b><br><span style="color:var(--gold)">${p.currentBid} USDT</span></div>
                </div>`).join('');
        }

        function openDetails(id) {
            currentP = allLots.find(x => x._id === id);
            document.getElementById('detail-content').innerHTML = `<h2>${currentP.title}</h2><p>${currentP.description}</p><h3 style="color:var(--gold)">${currentP.currentBid} USDT</h3>`;
            showScreen('detail');
            // Если аукцион завершен и текущий юзер - победитель, показываем кнопку оплаты
            const isWinner = tonConnectUI.wallet && tonConnectUI.wallet.account.address === currentP.highestBidder;
            document.getElementById('pay-winner-btn').style.display = (isWinner) ? 'block' : 'none';
        }

        async function saveProduct() {
            const data = { title: document.getElementById('c-title').value, description: document.getElementById('c-desc').value, mediaUrl: uploadedUrl, startPrice: document.getElementById('c-price').value, ownerWallet: tonConnectUI.wallet.account.address, currency: "USDT" };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            showScreen('home'); fetchLots();
        }

        async function makeBid() {
            const amount = document.getElementById('bid-input').value;
            await fetch('/api/bid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ productId: currentP._id, wallet: tonConnectUI.wallet.account.address, amount }) });
            fetchLots(); showScreen('home');
        }

        fetchLots();
    </script>
</body>
</html>
