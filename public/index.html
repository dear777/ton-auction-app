<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Antique Auction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        /* ПРЕМИУМ ПАЛИТРА */
        :root { 
            --bg: #0d0e10; 
            --card: #16181c; 
            --gold: #d4af37; /* Золотой акцент */
            --gold-hover: #f1c40f;
            --text: #ffffff; 
            --red: #ff4d4d; 
            --gray: #9ca3af; 
            --owner-bg: #1e293b; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        /* ЭЛЕГАНТНАЯ ШАПКА */
        .header { 
            background: rgba(22, 24, 28, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2d2f36; 
            position: sticky; top:0; z-index:100; 
            padding: 15px;
        }

        select { 
            background: #1f2229; border: 1px solid #374151; color: white; 
            padding: 10px; border-radius: 12px; font-size: 0.9rem; margin-top: 10px;
        }

        /* КАРТОЧКИ ЛОТОВ 2x2 */
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        
        .lot-card { 
            background: var(--card); 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #2d2f36; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .lot-card:active { transform: scale(0.97); }

        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        
        .card-info { padding: 12px; }
        .card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; color: #f3f4f6; }
        
        .card-prices { display: flex; flex-direction: column; margin-bottom: 6px; }
        .price-old { color: var(--gray); font-size: 0.75rem; text-decoration: line-through; opacity: 0.6; }
        .price-new { color: var(--gold); font-weight: 800; font-size: 1.1rem; }
        
        .card-timer { 
            color: var(--red); font-size: 0.75rem; font-weight: bold; 
            background: rgba(255,77,77,0.15); padding: 4px 8px; border-radius: 8px; display: inline-block;
        }

        /* ЭКРАН ДЕТАЛЕЙ */
        #detail-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        .disclaimer-box { 
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); 
            padding: 12px; border-radius: 14px; color: var(--gold); font-size: 0.8rem; 
            text-align: center; margin-bottom: 20px; line-height: 1.4;
        }

        /* КНОПКИ */
        .btn-main { 
            background: linear-gradient(135deg, var(--gold), #b8860b); 
            color: #000; border: none; width: calc(100% - 40px); 
            padding: 18px; border-radius: 18px; font-weight: 900; 
            position: fixed; bottom: 25px; left: 20px; z-index: 10; 
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* ЧАТ */
        .q-item-owner { background: var(--owner-bg); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .q-item-user { background: #25282e; padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #4b5563; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:900; color:var(--gold); font-size:1.4rem; letter-spacing: 2px;">GOLD AUCTION</div>
            <div id="ton-connect"></div>
        </div>
        <div class="filter-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="main-cat-filter" onchange="runFilters()">
                <option value="Все">Все категории</option>
                <option value="Антиквариат">🏺 Антиквариат</option>
                <option value="Монеты">🪙 Монеты</option>
                <option value="Разное">📦 Разное</option>
            </select>
            <select id="main-cur-filter" onchange="runFilters()">
                <option value="Все">Все валюты</option>
                <option value="TON">TON</option>
                <option value="USD">USD</option>
            </select>
        </div>
    </div>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:var(--gray); background:none; border:none; padding:15px 0; font-weight:bold;">← ВЕРНУТЬСЯ</button>
        <div class="disclaimer-box">🛡️ Ответственность за сохранность товара до передачи лежит полностью на продавце. Сделка защищена правилами аукциона.</div>
        <div id="detail-content"></div>
        <div id="detail-timer" style="color:var(--red); font-weight:bold; margin:20px 0; font-size:1.4rem; text-align:center;"></div>
        
        <div style="background: #16181c; padding: 20px; border-radius: 20px; border: 1px solid #2d2f36; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div id="highest-bidder" style="font-family:monospace; color:var(--gold); margin-bottom:12px; font-size:0.85rem; text-align:center;"></div>
            <div style="display: flex; gap: 10px; align-items: center; background: #000; padding: 5px; border-radius: 12px;">
                <input type="number" id="custom-bid-input" style="background:transparent; border:none; margin:0; font-size:1.5rem; text-align:right;">
                <div id="currency-label" style="font-weight:900; padding-right:15px; color:var(--gold);">TON</div>
            </div>
            <button class="btn-main" style="position:static; width:100%; margin-top:15px; box-shadow:none;" onclick="makeCustomBid()">ПОДТВЕРДИТЬ СТАВКУ</button>
        </div>

        <div style="margin-top:35px; border-top:1px solid #2d2f36; padding-top:25px;">
            <h3 style="color:var(--gold);">💬 ОБСУЖДЕНИЕ ЛОТА</h3>
            <div id="questions-list"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <input type="text" id="q-input" placeholder="Написать сообщение..." style="margin:0;">
                <button onclick="sendQuestion()" style="background:var(--gold); border:none; color:#000; border-radius:12px; padding:0 25px; font-weight:bold;">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="openCreate()">+ ВЫСТАВИТЬ СВОЙ ЛОТ</button>

    <script>
        /* Сюда вставь все функции скрипта из прошлого полного кода (fetchLots, makeCustomBid, sendQuestion и т.д.) */
    </script>
</body>
</html>
