<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; }
        
        .full-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; box-sizing: border-box; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 2000; display: none; }
        .tab-item { color: var(--gray); font-size: 0.7rem; text-align: center; cursor: pointer; }
        .tab-item.active { color: var(--gold); font-weight: bold; }
        
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 70px); background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-screen { display: block; }
        
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
        .q-box { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div id="screen-auth" class="full-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🏺</div>
        <h2 style="color: var(--gold); font-weight: 900;">GOLD AUCTION</h2>
        <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 30px;">Connect your wallet to enter the elite auction.</p>
        <div id="ton-connect-button"></div>
    </div>

    <div id="screen-pay" class="full-screen" style="display: none;">
        <div style="font-size: 60px; margin-bottom: 20px;">🛡️</div>
        <h2 style="color: var(--gold); font-weight: 900;">SECURE ACCESS</h2>
        <p style="color: #ccc; font-size: 0.85rem; line-height: 1.5; margin: 20px 0;">
            A one-time fee of <b style="color:var(--gold)">5 USDT</b> is required to filter out bots and ensure a safe trading environment for serious collectors.
        </p>
        <button class="btn-main" onclick="payEntryFee()">ACTIVATE ACCESS (5 USDT)</button>
        <button onclick="logout()" style="background:none; border:none; color:var(--gray); margin-top:20px;">Logout</button>
    </div>

    <div id="screen-home" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:900; color:var(--gold);">GOLD AUCTION</div>
            <div id="header-connect"></div>
        </div>
        <select id="filter-category" onchange="fetchLots()">
            <option value="All">All Items</option>
            <option value="Coins">Coins</option>
            <option value="Watch">Watches</option>
        </select>
        <div id="lots-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:15px;"></div>
    </div>

    <div id="screen-create" class="screen">
        <h2>List New Item</h2>
        <input type="text" id="c-title" placeholder="Title">
        <textarea id="c-desc" placeholder="Description"></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="c-cat"><option value="Coins">Coins</option><option value="Watch">Watches</option></select>
            <select id="c-curr"><option value="USDT">USDT</option><option value="TON">TON</option><option value="BTC">BTC</option></select>
        </div>
        <button onclick="openUpload()" style="background:#444; border:none; color:white; padding:15px; border-radius:12px;">📸 PHOTO</button>
        <input type="number" id="c-price" placeholder="Start Price">
        <button class="btn-main" onclick="saveProduct()">PUBLISH</button>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Profile</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px;">
            <p id="ui-wallet" style="font-size:0.6rem; color:var(--gray); word-break:break-all;"></p>
            <p>Karma: <span id="ui-karma" style="color:var(--gold); font-weight:bold;">100</span></p>
        </div>
        <button onclick="logout()" style="background:var(--red); color:white; border:none; padding:12px; width:100%; border-radius:12px; margin-top:20px;">LOGOUT</button>
    </div>

    <div id="screen-detail" class="screen">
        <button onclick="showScreen('home')" style="color:var(--gray); background:none; border:none; padding:10px 0;">← BACK</button>
        <div id="detail-content"></div>
        <div id="qa-section" style="margin-top:20px;">
            <h4>Discussion</h4>
            <div id="questions-list"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="q-input" style="margin:0;"><button onclick="sendQuestion()" style="background:var(--gold); border:none; padding:0 15px; border-radius:10px;">SEND</button></div>
        </div>
        <div style="margin-top:20px; background:var(--card); padding:15px; border-radius:15px;">
            <input type="number" id="bid-input" style="text-align:center;">
            <button class="btn-main" onclick="makeBid()">PLACE BID</button>
        </div>
    </div>

    <div id="main-nav" class="tab-bar">
        <div class="tab-item active" id="tab-home" onclick="showScreen('home')">🏠 FEED</div>
        <div class="tab-item" id="tab-create" onclick="showScreen('create')">➕ SELL</div>
        <div class="tab-item" id="tab-profile" onclick="showScreen('profile')">👤 PROFILE</div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ 
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', 
            buttonRootId: 'ton-connect-button' 
        });

        let currentUser = null; let allLots = []; let currentP = null; let uploadedUrl = "";

        async function handleStatusChange() {
            const wallet = tonConnectUI.wallet;
            if (!wallet) {
                document.getElementById('screen-auth').style.display = 'flex';
                document.getElementById('screen-pay').style.display = 'none';
                document.getElementById('main-nav').style.display = 'none';
                document.body.style.overflow = 'hidden';
                return;
            }

            const res = await fetch(`/api/user/${wallet.account.address}`);
            currentUser = await res.json();

            if (currentUser.isPaid) {
                document.getElementById('screen-auth').style.display = 'none';
                document.getElementById('screen-pay').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                document.body.style.overflow = 'auto';
                document.getElementById('header-connect').appendChild(document.getElementById('ton-connect-button'));
                showScreen('home'); fetchLots();
            } else {
                document.getElementById('screen-auth').style.display = 'none';
                document.getElementById('screen-pay').style.display = 'flex';
                document.getElementById('main-nav').style.display = 'none';
            }
        }

        tonConnectUI.onStatusChange(handleStatusChange);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active-screen');
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') document.getElementById('ui-wallet').innerText = currentUser.wallet;
        }

        async function fetchLots() {
            const res = await fetch('/api/products'); allLots = await res.json();
            document.getElementById('lots-list').innerHTML = allLots.map(p => `
                <div style="background:var(--card); border-radius:12px; overflow:hidden;" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
                    <div style="padding:8px; font-size:0.8rem;"><b>${p.title}</b><br><span style="color:var(--gold)">${p.currentBid} ${p.currency}</span></div>
                </div>`).join('');
        }

        function openDetails(id) {
            currentP = allLots.find(x => x._id === id);
            document.getElementById('detail-content').innerHTML = `
                <img src="${currentP.mediaUrl}" style="width:100%; border-radius:15px;">
                <h2>${currentP.title}</h2>
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:var(--gray)">Start: ${currentP.startPrice}</span>
                    <span style="color:var(--gold); font-weight:bold">Now: ${currentP.currentBid} ${currentP.currency}</span>
                </div><p>${currentP.description}</p>`;
            renderQuestions(); showScreen('detail');
        }

        function renderQuestions() {
            document.getElementById('questions-list').innerHTML = currentP.questions.map(q => `
                <div class="q-box">
                    <span style="font-size:0.7rem; color:var(--gold)">${q.isSeller ? 'SELLER' : 'BUYER'}</span>
                    <p style="margin:5px 0;">${q.text}</p>
                </div>`).join('');
        }

        async function sendQuestion() {
            const text = document.getElementById('q-input').value;
            const res = await fetch(`/api/products/${currentP._id}/ask`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userWallet: currentUser.wallet, text, isSeller: (currentUser.wallet === currentP.ownerWallet) })
            });
            currentP = await res.json(); renderQuestions(); document.getElementById('q-input').value = '';
        }

        async function makeBid() {
            const amount = Number(document.getElementById('bid-input').value);
            if(amount <= currentP.currentBid) return alert("Bid higher!");
            await fetch('/api/bid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ productId: currentP._id, wallet: currentUser.wallet, amount }) });
            fetchLots(); showScreen('home');
        }

        function openUpload() { cloudinary.openUploadWidget({ cloudName: 'dptgowe5b', uploadPreset: 'tonpreset' }, (err, res) => { if (!err && res.event === "success") { uploadedUrl = res.info.secure_url; } }); }
        async function logout() { await tonConnectUI.disconnect(); location.reload(); }
        async function payEntryFee() { window.location.href = `ton://transfer/UQDqKsn27Rq-w8NYpWE7gv-X2wWm2ntCFlvs6gboqDP8A0xu?amount=5000000&text=PAY-${currentUser.wallet.slice(-6)}&jetton=EQCxE6mUtQWq7sznu_G9vhqS6S86shwyuS_T5qPOW_S2V8W1`; }
        
        async function saveProduct() {
            const data = { title: document.getElementById('c-title').value, description: document.getElementById('c-desc').value, mediaUrl: uploadedUrl, category: document.getElementById('c-cat').value, currency: document.getElementById('c-curr').value, startPrice: document.getElementById('c-price').value, ownerWallet: currentUser.wallet };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            showScreen('home'); fetchLots();
        }

        handleStatusChange();
    </script>
</body>
</html>
