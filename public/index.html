<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .full-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; box-sizing: border-box; }
        .screen { display: none; padding: 20px; }
        .active-screen { display: block; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .lot-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="screen-pay" class="full-screen" style="display: none;">
        <div style="font-size: 60px; margin-bottom: 20px;">🏺</div>
        <h2 style="color: var(--gold);">SECURE ACCESS</h2>
        <p>Entry fee: 5 USDT. Supports the project and kills bots.</p>
        <button class="btn-main" onclick="payNow()">PAY & ENTER</button>
    </div>

    <div id="screen-home" class="screen">
        <h2 style="color:var(--gold)">GOLD AUCTION</h2>
        <div id="lots-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="screen-create" class="screen">
        <h2>List Item</h2>
        <input type="text" id="c-title" placeholder="Title">
        <textarea id="c-desc" placeholder="Description"></textarea>
        <button onclick="openUpload()" style="background:#444; color:white; padding:15px; border-radius:12px; width:100%;">📸 PHOTO</button>
        <input type="number" id="c-price" placeholder="Price">
        <button class="btn-main" onclick="saveProduct()">PUBLISH</button>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Profile</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; text-align: left;">
            <p>User: <b id="ui-name"></b></p>
            <p>ID: <span id="ui-id" style="color:var(--gray)"></span></p>
            <p>Karma: <b style="color:var(--gold)">100</b></p>
        </div>
    </div>

    <div class="tab-bar">
        <div onclick="showScreen('home')">🏠 FEED</div>
        <div onclick="showScreen('create')">➕ SELL</div>
        <div onclick="showScreen('profile')">👤 PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUser = null;
        const myAdminWallet = "UQDqKsn27Rq-w8NYpWE7gv-X2wWm2ntCFlvs6gboqDP8A0xu";

        async function initAuth() {
            const user = tg.initDataUnsafe.user;
            if (!user) {
                alert("Please open from Telegram!");
                return;
            }

            // Авто-логин через TG ID
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tgId: user.id, wallet: myAdminWallet }) // Шлем твой кошелек для Whitelist
            });
            currentUser = await res.json();

            if (currentUser.isPaid) {
                document.getElementById('screen-pay').style.display = 'none';
                showScreen('home');
                fetchLots();
            } else {
                document.getElementById('screen-pay').style.display = 'flex';
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screen-' + id).classList.add('active-screen');
            if(id === 'profile') {
                document.getElementById('ui-name').innerText = tg.initDataUnsafe.user.first_name;
                document.getElementById('ui-id').innerText = tg.initDataUnsafe.user.id;
            }
        }

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card">
                    <img src="${p.mediaUrl}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
                    <div style="padding:8px;"><b>${p.title}</b><br>${p.currentBid} USDT</div>
                </div>`).join('');
        }

        function payNow() {
            window.location.href = `ton://transfer/${myAdminWallet}?amount=5000000&text=PAY-${tg.initDataUnsafe.user.id}`;
        }

        let uploadedUrl = "";
        function openUpload() { cloudinary.openUploadWidget({ cloudName: 'dptgowe5b', uploadPreset: 'tonpreset' }, (err, res) => { if (!err && res.event === "success") { uploadedUrl = res.info.secure_url; } }); }

        async function saveProduct() {
            const data = { title: document.getElementById('c-title').value, description: document.getElementById('c-desc').value, mediaUrl: uploadedUrl, startPrice: document.getElementById('c-price').value, ownerTgId: tg.initDataUnsafe.user.id };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            showScreen('home'); fetchLots();
        }

        initAuth();
    </script>
</body>
</html>
