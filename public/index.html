<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #1a1c20; --card: #25282e; --accent: #0088cc; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #25282e; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        
        /* Стили списка */
        .lot-card { background: var(--card); margin: 12px; padding: 15px; border-radius: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .lot-card h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 1.2rem; }

        /* Нижняя панель */
        .nav-bar { position: fixed; bottom: 0; width: 100%; padding: 15px; background: var(--bg); border-top: 1px solid #333; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,136,204,0.3); }

        /* Экран создания */
        #create-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; }
        input, textarea, select { width: 100%; background: #333; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin-top: 5px; box-sizing: border-box; }
        label { font-size: 0.8rem; color: #888; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">💎 ЛОТЫ</div>
        <div id="ton-connect"></div>
    </div>

    <div id="lots-list">
        </div>

    <div id="create-modal">
        <h2>📦 Новый товар</h2>
        <label>Название</label>
        <input type="text" id="title" placeholder="Что продаете?">
        
        <label>Описание и Условия</label>
        <textarea id="desc" rows="3" placeholder="Состояние, доставка..."></textarea>
        
        <label>Стартовая цена</label>
        <input type="number" id="price" placeholder="1.0">

        <label>Валюта</label>
        <select id="currency">
            <option value="TON">TON</option>
            <option value="USD">USD ($)</option>
            <option value="ILS">Шекель (₪)</option>
        </select>

        <p style="font-size: 0.7rem; color: #666; margin-top: 20px;">
            ⚠️ Продавец несет ответственность за качество товара. Антиснайпер: 10 мин.
        </p>

        <button class="btn-add" onclick="saveProduct()">Опубликовать</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:15px;">Отмена</button>
    </div>

    <div class="nav-bar">
        <button class="btn-add" onclick="checkAuthAndOpen()">+ Добавить лот</button>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // 1. Проверка авторизации перед открытием формы
        function checkAuthAndOpen() {
            if (!tonConnectUI.wallet) {
                alert("❌ Сначала привяжите кошелек вверху экрана!");
                return;
            }
            document.getElementById('create-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('create-modal').style.display = 'none'; }

        // 2. Загрузка списка из базы
        async function fetchLots() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('lots-list');
            
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#555;">Пока нет активных лотов</div>';
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="lot-card">
                    <div>
                        <h3>${p.title}</h3>
                        <small style="color:#777;">Оплата: ${p.currency}</small>
                    </div>
                    <div class="price-tag">${p.currentBid} ${p.currency}</div>
                </div>
            `).join('');
        }

        // 3. Сохранение лота
        async function saveProduct() {
            const productData = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                startPrice: document.getElementById('price').value,
                currency: document.getElementById('currency').value,
                ownerWallet: tonConnectUI.wallet.account.address
            };

            await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });

            closeModal();
            fetchLots(); // Обновляем список
        }

        fetchLots();
    </script>
</body>
</html>
