<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --bg: #0d0e10; --card: #16181c; --gold: #d4af37; --text: #fff; --red: #ff4d4d; --gray: #888; --owner-bg: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; }
        
        .header { background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index:100; padding: 12px; }
        .filter-select { background: #1f2229; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; width: 100%; margin-top: 8px; font-size: 0.85rem; }

        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #2d2f36; cursor: pointer; transition: 0.2s; }
        .lot-card:active { transform: scale(0.96); }
        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; pointer-events: none; }
        
        .card-info { padding: 10px; pointer-events: none; }
        .card-price-new { color: var(--gold); font-weight: 800; font-size: 1rem; }
        .card-timer { color: var(--red); font-size: 0.75rem; font-weight: bold; background: rgba(255,77,77,0.1); padding: 3px 6px; border-radius: 6px; display: inline-block; margin-top: 5px; }

        #detail-screen, #create-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 18px; font-weight: 900; position: fixed; bottom: 20px; left: 15px; z-index: 10; cursor: pointer; text-transform: uppercase; }
        
        input, textarea, select { width: 100%; background: #1f2229; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; margin: 8px 0; box-sizing: border-box; }
        .q-item-user { background: #25282e; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid #555; }
        .q-item-owner { background: var(--owner-bg); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
        .disclaimer { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 12px; color: var(--gold); font-size: 0.75rem; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:900; color:var(--gold); letter-spacing:1px;">GOLD AUCTION</div>
            <div id="ton-connect"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <select class="filter-select" id="cat-filter" onchange="runFilters()">
                <option value="Все">Все категории</option>
                <option value="Антиквариат">🏺 Антиквариат</option>
                <option value="Монеты">🪙 Монеты</option>
                <option value="Древность">🗿 Древности</option>
                <option value="Живопись">🎨 Живопись</option>
                <option value="Разное">📦 Разное</option>
            </select>
            <select class="filter-select" id="cur-filter" onchange="runFilters()">
                <option value="Все">Все валюты</option>
                <option value="TON">TON</option>
                <option value="USD">USD</option>
                <option value="BTC">BTC</option>
            </select>
        </div>
    </div>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:var(--gray); background:none; border:none; padding:15px 0;">← НАЗАД</button>
        <div class="disclaimer">🛡️ Ответственность за сохранность товара лежит на продавце.</div>
        <div id="detail-content"></div>
        <div id="detail-timer" style="color:var(--red); font-weight:bold; margin:15px 0; font-size:1.3rem; text-align:center;"></div>
        
        <div style="background: #16181c; padding: 15px; border-radius: 15px; border: 1px solid #333;">
            <div id="bidder-val" style="font-size:0.75rem; color:var(--gold); text-align:center; margin-bottom:10px;">--</div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="bid-input" style="margin:0; flex:1; text-align:center; font-weight:bold;">
                <button onclick="makeBid()" style="background:var(--gold); border:none; border-radius:10px; padding:0 15px; font-weight:bold;">OK</button>
            </div>
        </div>

        <div style="margin-top:25px; border-top:1px solid #333; padding-top:20px;">
            <div id="questions-list"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="q-input" placeholder="Ваш вопрос..."><button onclick="sendQuestion()" style="background:var(--gold); border:none; padding:0 15px; border-radius:10px;">🔍</button>
            </div>
        </div>
    </div>

    <div id="create-screen">
        <h2>🆕 Создать лот</h2>
        <input type="text" id="c-title" placeholder="Название">
        <textarea id="c-desc" placeholder="Описание" rows="3"></textarea>
        <select id="c-cat">
            <option value="Антиквариат">🏺 Антиквариат</option>
            <option value="Монеты">🪙 Монеты</option>
            <option value="Разное">📦 Разное</option>
        </select>
        <select id="c-cond">
            <option value="Новое">💎 Новое</option>
            <option value="Б/У">👍 Б/У</option>
        </select>
        <button onclick="openUpload()" style="background:#444; color:#fff; border:none; padding:15px; width:100%; border-radius:12px; margin:10px 0;">📸 Загрузить фото</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="c-price" placeholder="Цена">
            <select id="c-cur"><option value="TON">TON</option><option value="USD">USD</option></select>
        </div>
        <button class="btn-main" onclick="saveProduct()" style="position:static; width:100%; margin-top:20px;">Опубликовать</button>
    </div>

    <button class="btn-main" onclick="openCreate()">+ Выставить товар</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect' });
        let allLots = []; let currentP = null; let uploadedUrl = "";

        function openUpload() { cloudinary.openUploadWidget({ cloudName: 'dptgowe5b', uploadPreset: 'tonpreset', sources: ['local', 'camera'], multiple: false }, (err, res) => { if (!err && res.event === "success") uploadedUrl = res.info.secure_url; }); }

        async function fetchLots() {
            const res = await fetch('/api/products'); allLots = await res.json();
            runFilters(); startTimers();
        }

        function runFilters() {
            const cat = document.getElementById('cat-filter').value;
            const cur = document.getElementById('cur-filter').value;
            const filtered = allLots.filter(p => (cat === 'Все' || p.category === cat) && (cur === 'Все' || p.currency === cur));
            document.getElementById('lots-list').innerHTML = filtered.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl || ''}" class="media-sq">
                    <div class="card-info">
                        <div class="card-title">${p.title}</div>
                        <div class="card-price-new">${p.currentBid} ${p.currency}</div>
                        <div class="card-timer timer-active" data-endtime="${p.endTime}">--:--:--</div>
                    </div>
                </div>`).join('');
        }

        async function openDetails(id) {
            currentP = allLots.find(x => x._id === id);
            document.getElementById('detail-content').innerHTML = `<img src="${currentP.mediaUrl}" style="width:100%; border-radius:15px;"><h2>${currentP.title} (${currentP.condition})</h2><p style="color:var(--gray)">${currentP.description}</p><div style="font-size:1.8rem; font-weight:bold; color:var(--gold); text-align:center;">${currentP.currentBid} ${currentP.currency}</div>`;
            document.getElementById('bidder-val').innerText = "Лидер: " + (currentP.highestBidder === "Ставок нет" ? "нет" : currentP.highestBidder.slice(0,14) + "...");
            document.getElementById('bid-input').value = currentP.currentBid + 1;
            renderForum();
            document.getElementById('detail-screen').style.display = 'block';
        }

        function renderForum() {
            document.getElementById('questions-list').innerHTML = currentP.questions.map(q => {
                const isOwner = q.userWallet.toLowerCase() === currentP.ownerWallet.toLowerCase();
                return `<div class="${isOwner ? 'q-item-owner' : 'q-item-user'}"><span style="font-size:0.6rem; font-weight:bold; color:${isOwner ? 'var(--gold)' : '#888'}">${isOwner ? 'ПРОДАВЕЦ' : 'ПОКУПАТЕЛЬ'}</span><br>${q.text}</div>`;
            }).join('');
        }

        async function sendQuestion() {
            const text = document.getElementById('q-input').value;
            if(!text || !tonConnectUI.wallet) return;
            await fetch(`/api/products/${currentP._id}/question`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address, text }) });
            document.getElementById('q-input').value = ""; fetchLots(); openDetails(currentP._id);
        }

        async function makeBid() {
            const amount = Number(document.getElementById('bid-input').value);
            if(!tonConnectUI.wallet || amount <= currentP.currentBid) return alert("Ошибка ставки!");
            const res = await fetch('/api/bid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ productId: currentP._id, wallet: tonConnectUI.wallet.account.address, amount }) });
            if(res.ok) { await fetchLots(); openDetails(currentP._id); }
        }

        function startTimers() {
            setInterval(() => {
                const now = new Date().getTime();
                document.querySelectorAll('.timer-active').forEach(el => {
                    const diff = new Date(el.dataset.endtime) - now;
                    el.innerText = diff > 0 ? new Date(diff).toISOString().substr(11, 8) : "ЗАВЕРШЕНО";
                });
                if(currentP) {
                    const diff = new Date(currentP.endTime) - now;
                    document.getElementById('detail-timer').innerText = diff > 0 ? "⏳ " + new Date(diff).toISOString().substr(11, 8) : "ЗАВЕРШЕНО";
                }
            }, 1000);
        }

        async function saveProduct() {
            const data = { title: document.getElementById('c-title').value, description: document.getElementById('c-desc').value, mediaUrl: uploadedUrl, category: document.getElementById('c-cat').value, condition: document.getElementById('c-cond').value, startPrice: document.getElementById('c-price').value, currency: document.getElementById('c-cur').value, ownerWallet: tonConnectUI.wallet.account.address };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; currentP = null; }
        function openCreate() { if(!tonConnectUI.wallet) return alert("Привяжите кошелек!"); document.getElementById('create-screen').style.display = 'block'; }
        fetchLots();
    </script>
</body>
</html>
