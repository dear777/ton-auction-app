<style>
    .badge { background: #eee; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; margin: 5px; display: inline-block; }
    .disclaimer { font-size: 0.7em; color: #777; border-top: 1px solid #ddd; margin-top: 20px; padding-top: 10px; }
    .q-and-a { text-align: left; background: #fafafa; padding: 10px; margin-top: 10px; border-radius: 8px; }
</style>

<div class="card">
    <div id="media-container"></div> <h1 id="p-title">Загрузка лота...</h1>
    
    <div id="badges">
        <span class="badge" id="p-condition">Состояние: --</span>
        <span class="badge" id="p-currency">Оплата: TON, BTC, USD</span>
    </div>

    <p id="p-desc" style="color: #666;">Описание товара появится здесь...</p>

    <div id="timer" style="color: red; font-weight: bold;">--:--:--</div>
    <div id="bid-value" style="font-size: 2em; color: #0088cc;">0</div>

    <button id="bid-btn" onclick="placeBid()">Сделать ставку</button>

    <div class="q-and-a">
        <small>Обсуждение лота:</small>
        <div id="questions-list"></div>
        <input type="text" id="q-input" placeholder="Задать вопрос...">
        <button onclick="askQuestion()" style="padding: 5px; width: auto;">?</button>
    </div>

    <div class="disclaimer">
        ⚠️ Продавец несет полную ответственность за качество и состояние товара.
    </div>
</div>
