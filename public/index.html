<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Marketplace Grid</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #fff; --red: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--card); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        
        /* СЕТКА ЛОТОВ */
        #lots-list { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Ровно 2 колонки */
            gap: 12px; 
            padding: 12px; 
        }

        /* КОМПАКТНАЯ КАРТОЧКА */
        .lot-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #2d3138; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.1s;
        }
        .lot-card:active { transform: scale(0.96); }

        /* КВАДРАТНОЕ ПРЕВЬЮ */
        .media-wrapper { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Делает блок идеально квадратным */
            background: #000;
            overflow: hidden;
            position: relative;
        }
        .media-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .no-media { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 0.8rem; }

        /* ИНФО ПОД ФОТО */
        .lot-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .lot-title { font-size: 0.9rem; font-weight: bold; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        .price-box { font-size: 1rem; color: var(--accent); font-weight: 800; margin-bottom: 4px; }
        .timer-box { font-size: 0.75rem; color: var(--red); font-weight: bold; background: rgba(255,77,77,0.1); padding: 4px 8px; border-radius: 6px; text-align: center; }

        /* КНОПКА ДОБАВЛЕНИЯ */
        .btn-add { background: var(--accent); color: white; border: none; width: calc(100% - 30px); padding: 16px; border-radius: 14px; font-weight: bold; position: fixed; bottom: 15px; left: 15px; box-shadow: 0 4px 20px rgba(0,136,204,0.4); z-index: 10; }

        /* ДЕТАЛИ И МОДАЛКИ (оставляем как были) */
        #detail-screen, #create-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        input, textarea { width: 100%; background: #25282e; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; color: var(--accent); letter-spacing: 1px;">TON AUCTION</div>
        <div id="ton-connect"></div>
    </div>

    <div id="lots-list">
        </div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:#888; background:none; border:none; padding:10px 0;">← Назад к списку</button>
        <div id="detail-content"></div>
        <div id="questions-section" style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <h3>💬 Обсуждение</h3>
            <div id="questions-container"></div>
            <div style="display:flex; gap:8px; margin-top:15px;">
                <input type="text" id="new-q" placeholder="Ваш вопрос..." style="margin:0;">
                <button onclick="sendQuestion()" style="background:var(--accent); border:none; color:#fff; border-radius:10px; padding:0 15px;">?</button>
            </div>
        </div>
    </div>

    <div id="create-screen">
        <h2>🆕 Создать лот</h2>
        <input type="text" id="title" placeholder="Название товара">
        <textarea id="desc" placeholder="Описание и условия доставки"></textarea>
        <input type="text" id="media" placeholder="Ссылка на Фото/Видео (URL)">
        <input type="number" id="price" placeholder="Начальная цена">
        <p style="font-size:0.7rem; color:#888;">⚠️ Условия лота нельзя изменить после публикации.</p>
        <button class="btn-add" onclick="saveProduct()" style="position:static; width:100%;">Опубликовать лот</button>
        <button onclick="document.getElementById('create-screen').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Отмена</button>
    </div>

    <button class="btn-add" onclick="openCreate()">+ Выставить товар</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        let currentProductId = null;

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <div class="media-wrapper">
                        ${p.mediaUrl ? `<img src="${p.mediaUrl}">` : `<div class="no-media">Без фото</div>`}
                    </div>
                    <div class="lot-info">
                        <div class="lot-title">${p.title}</div>
                        <div>
                            <div class="price-box">${p.currentBid} ${p.currency}</div>
                            <div class="timer-box timer-active" data-time="${p.endTime}">--:--:--</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Обновление таймеров в сетке
        setInterval(() => {
            document.querySelectorAll('.timer-active').forEach(timer => {
                const diff = new Date(timer.dataset.time) - new Date();
                if (diff <= 0) { timer.innerText = "ЗАВЕРШЕНО"; return; }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timer.innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            });
        }, 1000);

        async function openDetails(id) {
            currentProductId = id;
            const res = await fetch('/api/products');
            const products = await res.json();
            const p = products.find(x => x._id === id);
            
            const isOwner = tonConnectUI.wallet && tonConnectUI.wallet.account.address.toLowerCase() === p.ownerWallet.toLowerCase();

            document.getElementById('detail-content').innerHTML = `
                ${p.mediaUrl ? `<img src="${p.mediaUrl}" style="width:100%; border-radius:15px; margin-bottom:15px;">` : ''}
                <h1 style="margin:0;">${p.title}</h1>
                <p style="color:#aaa; font-size:0.9rem;">${p.description}</p>
                <div style="background:#25282e; padding:15px; border-radius:12px; margin:15px 0;">
                    <div style="font-size:0.8rem; color:#888;">Текущая цена:</div>
                    <div style="font-size:1.5rem; font-weight:bold; color:var(--accent);">${p.currentBid} ${p.currency}</div>
                </div>
                <button class="btn-add" onclick="makeBid()" style="position:static; width:100%;">Сделать ставку (+1 ${p.currency})</button>
            `;
            // Отрисовка вопросов... (код из прошлого ответа)
            document.getElementById('detail-screen').style.display = 'block';
        }

        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; }
        function openCreate() { if (!tonConnectUI.wallet) return alert("Привяжите кошелек!"); document.getElementById('create-screen').style.display = 'block'; }

        async function saveProduct() {
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                mediaUrl: document.getElementById('media').value,
                startPrice: document.getElementById('price').value,
                currency: "TON",
                ownerWallet: tonConnectUI.wallet.account.address
            };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        fetchLots();
    </script>
</body>
</html>
