<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD Auction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0d0e10; --gold: #d4af37; --text: #fff; --card: #16181c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .full-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; text-align: center; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .screen { display: none; padding: 20px; }
        .active-screen { display: block; }
        #ton-connect-button { margin: 20px 0; min-height: 44px; }
    </style>
</head>
<body>

    <div id="screen-auth" class="full-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🏺</div>
        <h2 style="color: var(--gold); font-weight: 900;">GOLD AUCTION</h2>
        <p style="color: #888;">Connect your wallet to enter the auction.</p>
        <div id="ton-connect-button"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#444; font-size:0.7rem; margin-top:20px;">Reset Connection</button>
    </div>

    <div id="screen-pay" class="full-screen" style="display: none;">
        <div style="font-size: 60px; margin-bottom: 20px;">🛡️</div>
        <h2>SECURE ACCESS</h2>
        <p style="color: #ccc;">One-time fee of 5 USDT required to prevent bots.</p>
        <button class="btn-main" onclick="payEntryFee()">ACTIVATE ACCESS</button>
        <button onclick="logout()" style="background:none; border:none; color:#888; margin-top:20px; text-decoration: underline;">Disconnect Wallet</button>
    </div>

    <div id="screen-app" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:900; color:var(--gold);">GOLD AUCTION</div>
            <div id="header-connect"></div>
        </div>
        <div id="lots-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ 
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json', 
            buttonRootId: 'ton-connect-button' 
        });

        async function updateUI() {
            const wallet = tonConnectUI.wallet;
            const authScreen = document.getElementById('screen-auth');
            const payScreen = document.getElementById('screen-pay');
            const appScreen = document.getElementById('screen-app');

            if (!wallet) {
                authScreen.style.display = 'flex';
                payScreen.style.display = 'none';
                appScreen.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`/api/user/${wallet.account.address}`);
                if (!res.ok) throw new Error("Server Error");
                const user = await res.json();

                if (user.isPaid) {
                    authScreen.style.display = 'none';
                    payScreen.style.display = 'none';
                    appScreen.style.display = 'block';
                    // Переносим кнопку в шапку
                    document.getElementById('header-connect').appendChild(document.getElementById('ton-connect-button'));
                    fetchLots();
                } else {
                    authScreen.style.display = 'none';
                    payScreen.style.display = 'flex';
                    appScreen.style.display = 'none';
                }
            } catch (e) {
                console.error("Sync error, retrying...", e);
                setTimeout(updateUI, 2000);
            }
        }

        tonConnectUI.onStatusChange(updateUI);

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div style="background:var(--card); border-radius:12px; padding:10px; font-size:0.8rem;">
                    <img src="${p.mediaUrl}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px;">
                    <b style="display:block; margin-top:5px;">${p.title}</b>
                    <span style="color:var(--gold)">${p.currentBid} USDT</span>
                </div>`).join('');
        }

        async function payEntryFee() {
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{
                    address: "UQDqKsn27Rq-w8NYpWE7gv-X2wWm2ntCFlvs6gboqDP8A0xu",
                    amount: "5000000"
                }]
            };
            try {
                await tonConnectUI.sendTransaction(tx);
                alert("Transaction sent! Wait for verification.");
            } catch (e) {
                alert("Connection error. Try again.");
            }
        }

        async function logout() {
            await tonConnectUI.disconnect();
            location.reload();
        }

        // Инициализация при загрузке
        updateUI();
    </script>
</body>
</html>
