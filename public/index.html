<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Marketplace Web3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Сетка 2x2 */
        #lots-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .lot-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .media-sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        
        /* Форум-стиль */
        .forum-msg { background: #25282e; padding: 12px; border-radius: 12px; margin-bottom: 10px; position: relative; }
        .msg-meta { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .msg-actions { display: flex; gap: 12px; margin-top: 8px; font-size: 0.75rem; color: var(--accent); cursor: pointer; }
        
        #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; width: calc(100% - 30px); padding: 18px; border-radius: 16px; font-weight: bold; position: fixed; bottom: 15px; left: 15px; }
        input, textarea { width: 100%; background: #25282e; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin: 8px 0; box-sizing: border-box; }
        .timer-red { color: #ff4d4d; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:#888; background:none; border:none; padding:10px 0;">← К списку</button>
        <div id="detail-content"></div>
        <div id="detail-timer" class="timer-red"></div>
        
        <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <h3>💬 Обсуждение лота</h3>
            <div id="questions-list"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="q-input" placeholder="Задать вопрос...">
                <button onclick="sendQuestion()" style="background:var(--accent); border:none; color:#fff; border-radius:10px; padding:0 15px;">🔍</button>
            </div>
        </div>
    </div>

    <div id="create-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
        <h2>🆕 Создать лот</h2>
        <input type="text" id="title" placeholder="Название">
        <textarea id="desc" placeholder="Описание и условия"></textarea>
        
        <button onclick="openUpload()" style="background:#444; color:#fff; border:none; padding:15px; width:100%; border-radius:12px;">📸 Загрузить медиа с телефона</button>
        <div id="status" style="font-size:0.8rem; color:var(--accent); text-align:center; margin-top:5px;">Файл не выбран</div>

        <input type="number" id="price" placeholder="Стартовая цена">
        <button class="btn-main" onclick="saveProduct()" style="position:static; width:100%; margin-top:20px;">Опубликовать</button>
        <button onclick="document.getElementById('create-screen').style.display='none'" style="background:none; border:none; color:#888; width:100%; margin-top:15px;">Отмена</button>
    </div>

    <div id="ton-connect" style="position:fixed; top:10px; right:10px;"></div>
    <button class="btn-main" onclick="openCreate()">+ Выставить товар</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        let uploadedUrl = "";
        let currentP = null;

        function openUpload() {
            cloudinary.openUploadWidget({
                cloudName: 'dptgowe5b', // Твой Cloud Name из скриншота
                uploadPreset: 'tonpreset', // Создай этот пресет как Unsigned
                sources: ['local', 'camera'],
                multiple: false
            }, (err, res) => {
                if (!err && res.event === "success") {
                    uploadedUrl = res.info.secure_url;
                    document.getElementById('status').innerText = "✅ Файл готов к публикации!";
                }
            });
        }

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    <img src="${p.mediaUrl || ''}" class="media-sq">
                    <div style="padding:10px;">
                        <div style="font-weight:bold; font-size:0.9rem;">${p.title}</div>
                        <div style="color:var(--accent); font-weight:bold;">${p.currentBid} TON</div>
                    </div>
                </div>
            `).join('');
        }

        async function openDetails(id) {
            const res = await fetch('/api/products');
            const data = await res.json();
            currentP = data.find(x => x._id === id);
            
            document.getElementById('detail-content').innerHTML = `
                <img src="${currentP.mediaUrl}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <h1>${currentP.title}</h1>
                <p style="color:#aaa;">${currentP.description}</p>
                <div style="font-size:1.4rem; font-weight:bold;">Цена: ${currentP.currentBid} TON</div>
            `;
            
            renderForum();
            document.getElementById('detail-screen').style.display = 'block';
            updateDetailTimer();
        }

        function renderForum() {
            const myWallet = tonConnectUI.wallet?.account.address;
            document.getElementById('questions-list').innerHTML = currentP.questions.map(q => `
                <div class="forum-msg">
                    <div class="msg-meta">Кошелек: ${q.userWallet.slice(0,6)}...</div>
                    <div id="qtext-${q._id}">${q.text}</div>
                    ${q.userWallet === myWallet ? `
                        <div class="msg-actions">
                            <span onclick="editMsg('${q._id}')">Изменить</span>
                            <span onclick="deleteMsg('${q._id}')" style="color:#ff4d4d">Удалить</span>
                        </div>
                    ` : ''}
                    ${q.answer ? `<div style="margin-top:8px; color:#00ff88;">💬 Ответ: ${q.answer}</div>` : ''}
                </div>
            `).join('');
        }

        function updateDetailTimer() {
            if (!currentP) return;
            const diff = new Date(currentP.endTime) - new Date();
            const timer = document.getElementById('detail-timer');
            if (diff <= 0) { timer.innerText = "ЗАВЕРШЕНО"; return; }
            timer.innerText = "⏳ До конца: " + new Date(diff).toISOString().substr(11, 8);
            setTimeout(updateDetailTimer, 1000);
        }

        async function saveProduct() {
            if (!uploadedUrl) return alert("Загрузите фото/видео!");
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                mediaUrl: uploadedUrl,
                startPrice: document.getElementById('price').value,
                currency: "TON",
                ownerWallet: tonConnectUI.wallet.account.address
            };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        // Функции форума
        async function deleteMsg(qId) {
            await fetch(`/api/products/${currentP._id}/question/${qId}`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address })
            });
            openDetails(currentP._id);
        }

        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; currentP = null; }
        function openCreate() { if(!tonConnectUI.wallet) return alert("Привяжите кошелек!"); document.getElementById('create-screen').style.display = 'block'; }

        fetchLots();
    </script>
</body>
</html>
