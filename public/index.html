<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Marketplace Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #121418; --card: #1e2126; --accent: #0088cc; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); position: sticky; top: 0; z-index: 100; }
        
        .lot-card { background: var(--card); margin: 15px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .lot-content { padding: 15px; }
        .media-preview { width: 100%; height: 200px; background: #000; object-fit: cover; }
        
        /* Экран деталей */
        #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .q-box { background: #25282e; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--accent); }
        .answer { color: #00ff88; margin-top: 5px; padding-left: 10px; border-left: 1px solid #444; }

        .btn-add { background: var(--accent); color: white; border: none; width: calc(100% - 40px); padding: 18px; border-radius: 16px; font-weight: bold; position: fixed; bottom: 20px; left: 20px; }
        input, textarea { width: 100%; background: #25282e; border: 1px solid #444; padding: 12px; color: white; border-radius: 10px; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: var(--accent);">MARKETPLACE</div>
        <div id="ton-connect"></div>
    </div>

    <div id="lots-list"></div>

    <div id="detail-screen">
        <button onclick="closeDetails()" style="color:#888; background:none; border:none; margin-bottom:10px;">← Назад</button>
        <div id="detail-content"></div>
        
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h3>💬 Обсуждение</h3>
        <div id="questions-container"></div>
        <input type="text" id="new-q" placeholder="Задать вопрос...">
        <button onclick="sendQuestion()" style="width:100%; margin-top:5px; background:#444; color:#fff; border:none; padding:10px; border-radius:8px;">Спросить</button>
    </div>

    <div id="create-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:1000; padding:20px; box-sizing:border-box;">
        <h2>🆕 Новый лот</h2>
        <input type="text" id="title" placeholder="Название">
        <textarea id="desc" placeholder="Описание и Условия"></textarea>
        <input type="text" id="media" placeholder="Ссылка на Фото/Видео (URL)">
        <input type="number" id="price" placeholder="Стартовая цена">
        <p style="font-size:0.7rem; color:#f44336;">⚠️ Внимание: после публикации данные нельзя будет изменить или удалить!</p>
        <button class="btn-add" onclick="saveProduct()" style="position:static; width:100%;">Опубликовать навсегда</button>
        <button onclick="document.getElementById('create-screen').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Отмена</button>
    </div>

    <button class="btn-add" onclick="openCreate()">+ Выставить товар</button>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ton-auction-bot.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        let currentProductId = null;

        async function fetchLots() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('lots-list').innerHTML = data.map(p => `
                <div class="lot-card" onclick="openDetails('${p._id}')">
                    ${p.mediaUrl ? `<img src="${p.mediaUrl}" class="media-preview">` : ''}
                    <div class="lot-content">
                        <div style="display:flex; justify-content:space-between">
                            <strong>${p.title}</strong>
                            <span style="color:var(--accent)">${p.currentBid} ${p.currency}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openDetails(id) {
            currentProductId = id;
            const res = await fetch('/api/products');
            const products = await res.json();
            const p = products.find(x => x._id === id);
            
            const isOwner = tonConnectUI.wallet && tonConnectUI.wallet.account.address.toLowerCase() === p.ownerWallet.toLowerCase();

            document.getElementById('detail-content').innerHTML = `
                ${p.mediaUrl ? `<img src="${p.mediaUrl}" style="width:100%; border-radius:15px;">` : ''}
                <h1>${p.title}</h1>
                <p style="color:#aaa">${p.description}</p>
                <div style="background:#25282e; padding:15px; border-radius:12px;">
                    <div>Текущая ставка: <strong>${p.currentBid} ${p.currency}</strong></div>
                    <div style="font-size:0.8rem; color:#888;">Продавец: ${p.ownerWallet.slice(0,6)}...</div>
                </div>
            `;

            document.getElementById('questions-container').innerHTML = p.questions.map(q => `
                <div class="q-box">
                    <div style="font-size:0.8rem; color:var(--accent)">Вопрос:</div>
                    <div>${q.text}</div>
                    ${q.answer ? `<div class="answer"><strong>Ответ:</strong> ${q.answer}</div>` : 
                      (isOwner ? `<input type="text" id="ans-${q._id}" placeholder="Ваш ответ..."><button onclick="sendAnswer('${q._id}')">Ответить</button>` : '')}
                </div>
            `).join('');

            document.getElementById('detail-screen').style.display = 'block';
        }

        function closeDetails() { document.getElementById('detail-screen').style.display = 'none'; }

        function openCreate() {
            if (!tonConnectUI.wallet) return alert("Привяжите кошелек!");
            document.getElementById('create-screen').style.display = 'block';
        }

        async function saveProduct() {
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                mediaUrl: document.getElementById('media').value,
                startPrice: document.getElementById('price').value,
                currency: "TON",
                ownerWallet: tonConnectUI.wallet.account.address
            };
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        async function sendQuestion() {
            const text = document.getElementById('new-q').value;
            await fetch(`/api/products/${currentProductId}/question`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: "User", text })
            });
            openDetails(currentProductId);
        }

        async function sendAnswer(qId) {
            const answer = document.getElementById(`ans-${qId}`).value;
            await fetch(`/api/products/${currentProductId}/answer`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ wallet: tonConnectUI.wallet.account.address, questionId: qId, answer })
            });
            openDetails(currentProductId);
        }

        fetchLots();
    </script>
</body>
</html>
